<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="html, css">
    <meta name="author" content="Ana Clarissi">

    <title>Project: Sign-up Form | The Odin Project</title>

    <link rel="stylesheet" href="src/css/style.css">

</head>
<body>
    
    <main class="container">

        <section class="container_img">

            <article class="container_logo">

                <img src="src/images/odin-lined.png" alt="Odin Logo" class="logo_img">

                <h1>Odin</h1>

            </article>

        </section>

        <section class="content">

            <form action="" class="form_content">

                <section class="form_infos">

                    <p>This is not a real online sercice! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>

                    <p>You <em>know</em> you want to.</p>

                </section>

                <section class="form_area">

                    <h2>Let's do this!</h2>

                    <section class="form_row">

                        <article class="form_item">
                            <label for="first_name">First Name</label>
                            <input type="text" name="first_name" id="first_name
                            " required>
                        </article>

                        <article class="form_item">
                            <label for="last_name">Last Name</label>
                            <input type="text" name="last_name" id="last_name
                            " required>
                        </article>

                    </section>

                    <section class="form_row">

                        <article class="form_item">
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email
                            " required>
                        </article>

                        <article class="form_item">
                            <label for="phone_number">Phone Number</label>
                            <input type="tel" name="phone_number" id="phone_number
                            " required>
                        </article>

                    </section>

                    <section class="form_row">

                        <article class="form_item">
                            <label for="password">Password</label>
                            <input type="password" name="password" id="password
                            " required>
                        </article>

                        <article class="form_item">
                            <label for="confirm_password">Confirm Password</label>
                            <input type="password" name="confirm_password" id="confirm_password
                            " required>
                        </article>

                    </section>

                </section>

                <section class="form_footer">

                    <button type="submit" class="btn_create">Create Account</button>

                    <p>Already have an account? <a href="#">Log in</a></p>

                </section>

            </form>

        </section>

    </main>

</body>
</html>
